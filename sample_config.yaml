# Architecture Decision Record: Session Caching Strategy
# Decision: Use Redis for session caching over PostgreSQL

server:
  host: "0.0.0.0"
  port: 8080
  workers: 4

database:
  primary:
    provider: postgresql
    host: db-primary.internal
    port: 5432
    # Used for persistent user data only
    max_connections: 50

  cache:
    provider: redis
    host: redis-cache.internal
    port: 6379
    # Decision rationale: Redis delivers sub-10ms response times
    # PostgreSQL had 400ms latency under 10,000 concurrent users
    # Decision made after load testing on 2026-06-15
    ttl_seconds: 3600
    max_memory: "2gb"

logging:
  level: debug
  format: json
  output: stdout
